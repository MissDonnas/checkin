<div class="container">
    <h1>Student Attendance</h1>
    <div id="current-date" class="current-date"></div>

    <div class="status-bar">
        <span>Total: <strong id="totalCount">0</strong></span>
        <span>Full: <strong id="fullScheduledCount">0</strong></span>
        <span>Short: <strong id="shortScheduledCount">0</strong></span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('all')">All</button>
        <button class="tab-btn" onclick="showTab('full')">Full Day</button>
        <button class="tab-btn" onclick="showTab('short')">Shortened</button>
        <button class="tab-btn" onclick="showTab('history')">History</button>
    </div>

    <div id="student-list" class="tab-content active"></div>
    <div id="history-list" class="tab-content"></div>

    <div class="top-buttons">
        <button id="savePdfButton" class="action-btn save-pdf-btn">Save Report</button>
        <button id="resetAllButton" class="action-btn reset-btn">Reset Day</button>
    </div>
</div>
